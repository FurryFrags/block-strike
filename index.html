<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Block Strike: Voxel Frontline</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="menu" class="screen">
    <div class="panel">
      <h1>BLOCK STRIKE: VOXEL FRONTLINE</h1>
      <p>Minecraft-style fast FPS sandbox with weapons spanning WW2 to the modern era.</p>
      <ul>
        <li>WASD to move, mouse to look</li>
        <li>Left click to fire, R reload</li>
        <li>Q / E swaps weapon era</li>
        <li>Shift to sprint</li>
        <li>P cycles perspective</li>
      </ul>
      <button id="playBtn">Deploy</button>
    </div>
  </div>

  <div id="gameWrap" class="hidden">
    <div id="hud">
      <div>HP <span id="hudHp">100</span></div>
      <div id="hudWeapon">M4A1</div>
      <div>Ammo <span id="hudAmmo">30/90</span></div>
      <div>Alpha <span id="hudKills">0</span></div>
      <div>Beta <span id="hudEnemies">0</span></div>
      <div id="hudTimer">03:00</div>
      <div id="hudStatus">Hot Zone</div>
      <button id="exitBtn">Exit</button>
    </div>
    <canvas id="gameCanvas" width="1280" height="720"></canvas>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
